<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Character Card</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Snortleblat Character Card">
    <meta property="og:description" content="Character card for Snortleblat the Swamp Beast Diplomat">
    <meta property="og:url" content="https://yourusername.github.io/wdd131/charactercard">
    <meta property="og:image" content="https://yourusername.github.io/wdd131/charactercard/snortleblat.webp">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Snortleblat Character Card">
    <meta name="twitter:description" content="Character card for Snortleblat the Swamp Beast Diplomat">
    <meta name="twitter:image" content="https://yourusername.github.io/wdd131/charactercard/snortleblat.webp">

    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>

<body>
    <div class="card">
        <img src="snortleblat.webp" alt="Snortleblat" class="image">

        <h1 class="name">Snortleblat</h1>

        <section class="stats">
            <p>Class: Swamp Beast Diplomat</p>
            <p>Level: <span id="level"></span></p>
            <p>Health: <span id="health"></span></p>
        </section>

        <div class="buttons">
            <button id="attackBtn">Attack</button>
            <button id="levelBtn">Level Up</button>
        </div>
    </div>
</body>
</html>
